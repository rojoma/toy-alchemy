name: "✨ 新機能リクエスト (Feature)"
description: 新しい機能の提案
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      placeholder: "学習履歴を週単位で見たい。今は時系列で全部並んでいて見づらい。"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案
      placeholder: "/history に週/月の集計切り替えタブを追加"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・検討した他のアプローチ
