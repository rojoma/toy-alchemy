# Railway / Nixpacks build config — installs only the lean training_field deps,
# avoiding the broader toy-alchemy sibling-project dependencies.
[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["pip install --upgrade pip && pip install -r training_field/requirements.txt"]

[start]
cmd = "uvicorn training_field.web.app:app --host 0.0.0.0 --port $PORT"
