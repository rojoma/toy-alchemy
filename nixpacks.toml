# Railway / Nixpacks build config — installs only the lean training_field deps,
# avoiding the broader toy-alchemy sibling-project dependencies.
[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
# Explicitly install google-genai because the bundled requirements.txt entry
# was sometimes skipped by build caching. Listed first so it's clearly visible
# in build logs.
cmds = [
    "pip install --upgrade pip",
    "pip install --no-cache-dir 'google-genai>=1.0.0'",
    "pip install --no-cache-dir -r training_field/requirements.txt",
]

[start]
cmd = "uvicorn training_field.web.app:app --host 0.0.0.0 --port $PORT"
